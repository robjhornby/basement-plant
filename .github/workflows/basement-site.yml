name: Build and publish basement site

on:
  schedule:
    # Daily, after the X-Sense export email should have landed in R2.
    - cron: "30 2 * * *"
  workflow_dispatch:

concurrency:
  group: basement-site
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

env:
  R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET: ${{ secrets.R2_BUCKET }}
  R2_SITE_BUCKET: ${{ secrets.R2_SITE_BUCKET }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      # GitHub auto-disables scheduled workflows in public repos after 60 days
      # without repo activity. Re-enabling on every run resets that timer so
      # the daily cron keeps firing even if nothing else touches the repo.
      - name: Keep scheduled workflow enabled
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api -X PUT "repos/${{ github.repository }}/actions/workflows/basement-site.yml/enable"

      - name: Download accepted ingest manifests and CSVs from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          # R2 predates the aws-cli default CRC32 request checksums; only send them when required.
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
        run: |
          aws s3 sync "s3://$R2_BUCKET/manifests/ingest" build/r2-pipeline/manifests/ingest \
            --endpoint-url "$R2_ENDPOINT_URL" --no-progress
          aws s3 sync "s3://$R2_BUCKET/csv/source=x-sense" build/r2-pipeline/csv/source=x-sense \
            --endpoint-url "$R2_ENDPOINT_URL" --no-progress

      - name: Curate accepted email CSVs into Parquet
        run: >
          uv run basement curate-ingested-r2
          --object-store-dir build/r2-pipeline
          --curated-data-dir build/curated-r2-parquet
          --timings-dir build/timings
          --refresh-weather

      - name: Publish refreshed curated Parquet to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          # R2 predates the aws-cli default CRC32 request checksums; only send them when required.
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
        run: >
          aws s3 sync build/curated-r2-parquet "s3://$R2_BUCKET/parquet"
          --delete
          --endpoint-url "$R2_ENDPOINT_URL" --no-progress

      - name: Build static site from curated Parquet in R2
        run: >
          uv run basement --reuse-curated
          --output-dir build/gha-site/site
          --curated-data-dir "s3://$R2_BUCKET/parquet"
          --timings-dir build/timings

      - name: Publish site HTML to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          # R2 predates the aws-cli default CRC32 request checksums; only send them when required.
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
        run: |
          aws s3 sync build/gha-site/site "s3://$R2_SITE_BUCKET" \
            --exclude '*' --include 'index.html' --include 'physics-report.html' \
            --content-type 'text/html; charset=utf-8' \
            --endpoint-url "$R2_ENDPOINT_URL" --no-progress
          aws s3 cp build/gha-site/site/build-info.json "s3://$R2_SITE_BUCKET/build-info.json" \
            --content-type 'application/json; charset=utf-8' \
            --endpoint-url "$R2_ENDPOINT_URL" --no-progress

      - name: Write phase timings to the job summary
        if: always()
        run: |
          if [ -d build/timings ]; then
            uv run basement timings-summary \
              --timings-dir build/timings \
              $( [ -f build/gha-site/site/build-info.json ] && \
                 echo --build-info build/gha-site/site/build-info.json ) \
              >> "$GITHUB_STEP_SUMMARY"
          fi
