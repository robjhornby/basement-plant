name: Build and publish basement site

on:
  schedule:
    # Daily, after the X-Sense export email should have landed in R2.
    - cron: "30 6 * * *"
  workflow_dispatch:

concurrency:
  group: basement-site
  cancel-in-progress: false

permissions:
  contents: read

env:
  R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET: ${{ secrets.R2_BUCKET }}
  R2_SITE_BUCKET: ${{ secrets.R2_SITE_BUCKET }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build static site from curated Parquet in R2
        run: >
          uv run basement --reuse-curated
          --output-dir build/gha-site/site
          --curated-data-dir "s3://$R2_BUCKET/parquet"

      - name: Publish site HTML to R2
        run: |
          npx --yes wrangler@latest r2 object put "$R2_SITE_BUCKET/index.html" \
            --file build/gha-site/site/index.html \
            --content-type 'text/html; charset=utf-8' \
            --remote
          npx --yes wrangler@latest r2 object put "$R2_SITE_BUCKET/physics-report.html" \
            --file build/gha-site/site/physics-report.html \
            --content-type 'text/html; charset=utf-8' \
            --remote
