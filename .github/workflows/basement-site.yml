name: Build and publish basement site

on:
  schedule:
    # Daily, after the X-Sense export email should have landed in R2.
    - cron: "30 6 * * *"
  workflow_dispatch:

concurrency:
  group: basement-site
  cancel-in-progress: false

permissions:
  contents: read

env:
  R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET: ${{ secrets.R2_BUCKET }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build static site from curated Parquet in R2
        run: >
          uv run basement --reuse-curated
          --output-dir build/gha-site/site
          --curated-data-dir "s3://$R2_BUCKET/parquet"

      - name: Publish site HTML to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          # R2 predates the aws-cli default CRC32 request checksums; only send them when required.
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
        run: >
          aws s3 sync build/gha-site/site "s3://$R2_BUCKET/site/basement-site"
          --exclude '*' --include '*.html'
          --content-type 'text/html; charset=utf-8'
          --endpoint-url "$R2_ENDPOINT_URL" --no-progress
